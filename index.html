<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.js"></script>
    <style>
        :root {
            --bg: #0f0f0f; --text: #ffffff; --sidebar: #1a1a1a;
            --accent: #00ff88; --hover: #2a2a2a; --border: #333;
            --danger: #ff4444; --success: #00ff88; --warning: #ffaa00;
        }
        [data-theme="light"] {
            --bg: #f0f0f0; --text: #1a1a1a; --sidebar: #ffffff;
            --accent: #0088ff; --hover: #e0e0e0; --border: #ccc;
        }

        /* Estrutura Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            width: 100%; height: 100%; 
            background: #000; color: var(--text); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            overflow: hidden; 
        }

        /* Sidebar - Menu Lateral */
        #sidebar { 
            position: fixed; top: 0; left: 0; 
            width: 320px; height: 100%; 
            background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; 
            z-index: 2000;
            transition: transform 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }
        
        /* Mobile: Esconde a barra por padrão */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); width: 280px; }
            #sidebar.open { transform: translateX(0); }
        }

        .header { padding: 15px; border-bottom: 1px solid var(--border); }
        
        #canal-list-container { 
            flex: 1; overflow-y: auto; padding: 10px;
            -webkit-overflow-scrolling: touch;
        }
        
        #canal-list-container::-webkit-scrollbar {
            width: 6px;
        }
        
        #canal-list-container::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        #canal-list-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        input#search { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); margin-top: 10px; outline: none;
            transition: border-color 0.2s;
        }
        
        input#search:focus {
            border-color: var(--accent);
        }

        .btn-radio {
            width: 100%; padding: 12px; background: var(--accent); color: #000;
            border: none; font-weight: bold; cursor: pointer; border-radius: 6px; 
            margin-bottom: 15px; font-size: 13px;
            transition: opacity 0.2s;
        }
        
        .btn-radio:hover {
            opacity: 0.9;
        }

        .canal-item { 
            padding: 12px; margin-bottom: 5px; border-radius: 6px; cursor: pointer;
            font-size: 14px; border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .canal-item:hover { background: var(--hover); transform: translateX(2px); }
        .canal-item.active { background: var(--accent); color: #000; font-weight: bold; }
        .canal-item.loading { opacity: 0.6; pointer-events: none; }
        
        .channel-icon {
            font-size: 16px;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-left: auto;
        }
        
        .status-indicator.error {
            background: var(--danger);
        }

        /* Área Principal do Conteúdo */
        #main { 
            position: absolute; top: 0; right: 0;
            width: calc(100% - 320px); height: 100%; 
            background: #000; z-index: 1;
        }
        
        @media (max-width: 768px) {
            #main { width: 100%; }
        }

        #content-area, iframe, video { 
            width: 100%; height: 100%; border: none; 
            position: absolute; top: 0; left: 0; 
        }
        
        video { object-fit: contain; display: none; background: #000; }
        
        /* Categorias */
        .category-header {
            padding: 10px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin: 10px 0 5px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .category-header:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .category-header .category-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .category-header .category-count {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        
        .category-header .toggle-icon {
            transition: transform 0.3s;
        }
        
        .category-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        
        .category-content {
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .category-content.collapsed {
            max-height: 0 !important;
        }
        
        /* Filtro de categorias */
        .category-filter {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 15px;
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }
        
        /* Ícones por categoria */
        .cat-esportes::before { content: '⚽'; }
        .cat-noticias::before { content: '📰'; }
        .cat-filmes::before { content: '🎬'; }
        .cat-series::before { content: '📺'; }
        .cat-documentarios::before { content: '📖'; }
        .cat-infantis::before { content: '🧸'; }
        .cat-musica::before { content: '🎵'; }
        .cat-religioso::before { content: '🙏'; }
        .cat-educativo::before { content: '📚'; }
        .cat-variedades::before { content: '🌟'; }
        .cat-default::before { content: '📡'; }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error Message */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--danger);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
            z-index: 1001;
        }
        
        .error-message.active {
            display: block;
        }

        /* Botão Menu Mobile */
        #menu-toggle { 
            display: none; position: fixed; top: 15px; left: 15px; 
            z-index: 2100; padding: 10px 20px; background: var(--accent); 
            color: #000; border: none; cursor: pointer; border-radius: 50px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        
        #menu-toggle:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) { #menu-toggle { display: block; } }
        
        /* Overlay para mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
        
        .sidebar-overlay.active {
            display: block;
        }
        
        /* Ajuste para lista com categorias */
        #canal-list {
            padding-bottom: 10px;
        }
    </style>
</head>
<body data-theme="dark">

<button id="menu-toggle" onclick="toggleMenu()">☰ CANAIS</button>

<aside id="sidebar">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="font-size: 16px;">📺 IPTV MASTER</h3>
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:18px;" title="Alternar tema">🌓</button>
        </div>
        <input type="text" id="search" placeholder="🔍 Buscar canal..." oninput="filtrarCanais()" autocomplete="off">
        <div style="margin-top: 8px; font-size: 11px; color: var(--text); opacity: 0.7;">
            <span id="channel-count">0</span> canais disponíveis
        </div>
    </div>
    
    <div id="canal-list-container">
        <button class="btn-radio" onclick="abrirRadio()">📻 VOLTAR PARA RÁDIO</button>
        
        <!-- Filtros rápidos de categoria -->
        <div id="category-filters" class="category-filter"></div>
        
        <div id="canal-list">Carregando canais...</div>
    </div>
</aside>

<main id="main">
    <div id="content-area">
        <iframe src="https://www.radiopositivafm.com.br/play/"></iframe>
    </div>
    <video id="videoPlayer" controls playsinline></video>
    
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>
    
    <div class="error-message" id="error-message"></div>
</main>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>

<script>
    let player = null;
    let allChannels = [];
    let channelsByCategory = {};
    let currentChannelUrl = null;
    let activeCategory = 'todos';
    const videoElement = document.getElementById('videoPlayer');
    const contentArea = document.getElementById('content-area');
    const sidebar = document.getElementById('sidebar');
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorMessage = document.getElementById('error-message');
    const channelCount = document.getElementById('channel-count');
    const overlay = document.getElementById('sidebar-overlay');
    const categoryFiltersContainer = document.getElementById('category-filters');

    // Mapeamento de categorias para ícones e nomes amigáveis
    const categoryIcons = {
        'esportes': '⚽ Esportes',
        'noticias': '📰 Notícias',
        'filmes': '🎬 Filmes',
        'series': '📺 Séries',
        'documentarios': '📖 Documentários',
        'infantil': '🧸 Infantil',
        'criancas': '🧸 Crianças',
        'musica': '🎵 Música',
        'religioso': '🙏 Religioso',
        'gospel': '🙏 Gospel',
        'educativo': '📚 Educativo',
        'variedades': '🌟 Variedades',
        'entretenimento': '🌟 Entretenimento',
        'lifestyle': '💼 Lifestyle',
        'culinaria': '🍳 Culinária',
        'viagem': '✈️ Viagem',
        'natureza': '🌿 Natureza',
        'ciencia': '🔬 Ciência',
        'historia': '📜 História',
        'business': '💼 Negócios',
        'adulto': '🔞 Adulto'
    };

    // Debounce para busca
    let searchTimeout = null;
    function debounce(func, delay) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(func, delay);
    }

    async function fetchM3U() {
        showLoading();
        const url = "https://raw.githubusercontent.com/ting560/tv/refs/heads/main/minha_lista_canais.m3u";
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('Falha ao carregar');
            const data = await res.text();
            parseM3U(data);
            hideLoading();
        } catch (err) {
            console.error('Erro:', err);
            document.getElementById('canal-list').innerText = "❌ Erro ao carregar lista. Verifique sua conexão.";
            hideLoading();
            showError('Não foi possível carregar os canais. Tente novamente.');
        }
    }

    function parseM3U(content) {
        const lines = content.split('\n');
        allChannels = [];
        channelsByCategory = {};
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXTINF')) {
                const name = lines[i].split(',')[1] || "Canal sem nome";
                const url = lines[i+1]?.trim();
                
                if (url && url.startsWith('http')) {
                    const group = extractGroup(lines[i]);
                    const category = normalizeCategory(group);
                    
                    const channel = { 
                        name: name.trim(), 
                        url: url,
                        group: group,
                        category: category
                    };
                    
                    allChannels.push(channel);
                    
                    // Organiza por categoria
                    if (!channelsByCategory[category]) {
                        channelsByCategory[category] = [];
                    }
                    channelsByCategory[category].push(channel);
                }
            }
        }
        
        // Ordena alfabeticamente
        allChannels.sort((a, b) => a.name.localeCompare(b.name));
        
        // Ordena canais dentro de cada categoria
        Object.keys(channelsByCategory).forEach(cat => {
            channelsByCategory[cat].sort((a, b) => a.name.localeCompare(b.name));
        });
        
        updateChannelCount();
        renderCategoryFilters();
        renderCanaisPorCategoria();
    }
    
    function extractGroup(line) {
        const match = line.match(/group-title="([^"]*)/);
        return match ? match[1] : '';
    }
    
    function normalizeCategory(group) {
        if (!group) return 'outros';
        
        const normalized = group.toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]/g, '');
        
        // Mapeia para categorias conhecidas
        for (const key in categoryIcons) {
            if (normalized.includes(key)) {
                return key;
            }
        }
        
        return 'outros';
    }
    
    function getCategoryIcon(category) {
        return categoryIcons[category] || '📡 ' + capitalizeFirst(category);
    }
    
    function capitalizeFirst(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }
    
    function renderCategoryFilters() {
        const categories = Object.keys(channelsByCategory).sort();
        
        let html = `<button class="filter-btn active" data-category="todos" onclick="filtrarCategoria('todos')">
            Todos (${allChannels.length})
        </button>`;
        
        categories.forEach(cat => {
            const count = channelsByCategory[cat].length;
            const icon = getCategoryIcon(cat);
            html += `<button class="filter-btn" data-category="${cat}" onclick="filtrarCategoria('${cat}')">
                ${icon} (${count})
            </button>`;
        });
        
        categoryFiltersContainer.innerHTML = html;
    }
    
    function filtrarCategoria(category) {
        activeCategory = category;
        localStorage.setItem('lastCategory', category);
        
        // Atualiza botões
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            }
        });
        
        // Reseta busca
        document.getElementById('search').value = '';
        
        // Renderiza
        renderCanaisPorCategoria();
    }
    
    function renderCanaisPorCategoria() {
        const container = document.getElementById('canal-list');
        container.innerHTML = '';
        
        let categoriesToShow;
        
        if (activeCategory === 'todos') {
            categoriesToShow = Object.keys(channelsByCategory).sort();
        } else {
            categoriesToShow = [activeCategory];
        }
        
        let totalChannels = 0;
        
        categoriesToShow.forEach(cat => {
            const channels = channelsByCategory[cat] || [];
            if (channels.length === 0) return;
            
            totalChannels += channels.length;
            
            // Cria header da categoria
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = `
                <span class="category-name">
                    <span>${getCategoryIcon(cat)}</span>
                    <span class="category-count">${channels.length}</span>
                </span>
                <span class="toggle-icon">▼</span>
            `;
            
            // Toggle collapse
            header.onclick = () => toggleCategory(cat);
            
            container.appendChild(header);
            
            // Cria conteúdo da categoria
            const content = document.createElement('div');
            content.className = 'category-content';
            content.id = `category-${cat}`;
            
            content.innerHTML = channels.map(c => `
                <div class="canal-item" onclick="playCanal('${c.url}', this)">
                    <span class="channel-icon">📺</span>
                    <span>${escapeHtml(c.name)}</span>
                    <div class="status-indicator"></div>
                </div>
            `).join('');
            
            container.appendChild(content);
            
            // Define max-height para animação
            content.style.maxHeight = content.scrollHeight + 'px';
        });
        
        updateChannelCount(totalChannels);
        
        if (categoriesToShow.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; opacity: 0.7;">Nenhum canal encontrado</div>';
        }
    }
    
    function toggleCategory(category) {
        const header = event.currentTarget;
        const content = document.getElementById(`category-${category}`);
        
        header.classList.toggle('collapsed');
        content.classList.toggle('collapsed');
        
        if (content.classList.contains('collapsed')) {
            content.style.maxHeight = '0';
        } else {
            content.style.maxHeight = content.scrollHeight + 'px';
        }
    }

    function filtrarCanais() {
        const term = document.getElementById('search').value.toLowerCase().trim();
        
        debounce(() => {
            // Se houver busca, mostra lista plana sem categorias
            if (term.length > 0) {
                const filtered = allChannels.filter(c => 
                    c.name.toLowerCase().includes(term) ||
                    (c.group && c.group.toLowerCase().includes(term)) ||
                    (c.category && c.category.toLowerCase().includes(term))
                );
                
                const container = document.getElementById('canal-list');
                if (filtered.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center; opacity: 0.7;">Nenhum canal encontrado</div>';
                } else {
                    container.innerHTML = filtered.map(c => `
                        <div class="canal-item" onclick="playCanal('${c.url}', this)">
                            <span class="channel-icon">📺</span>
                            <span>${escapeHtml(c.name)} <small style="opacity:0.6">(${getCategoryIcon(c.category)})</small></span>
                            <div class="status-indicator"></div>
                        </div>
                    `).join('');
                }
                updateChannelCount(filtered.length);
            } else {
                // Sem busca, volta para visualização por categorias
                renderCanaisPorCategoria();
            }
        }, 300);
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function updateChannelCount(count = allChannels.length) {
        channelCount.textContent = count;
    }

    function abrirRadio() {
        if (player) { 
            if (player.isPlaying()) player.pause(); 
            player.unload(); 
            player.destroy();
            player = null;
        }
        currentChannelUrl = null;
        videoElement.style.display = 'none';
        contentArea.innerHTML = '<iframe src="https://www.radiopositivafm.com.br/play/"></iframe>';
        hideError();
        if(window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
    }

    function playCanal(url, el) {
        // Remove active de todos
        document.querySelectorAll('.canal-item').forEach(i => i.classList.remove('active'));
        
        // Se já está tocando o mesmo canal, ignora
        if (currentChannelUrl === url) {
            el.classList.add('active');
            return;
        }
        
        currentChannelUrl = url;
        el.classList.add('active');
        
        if(window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // Limpa player anterior
        if (player) { 
            player.unload(); 
            player.destroy(); 
            player = null;
        }

        showLoading();
        hideError();
        
        contentArea.innerHTML = '';
        videoElement.style.display = 'block';

        // Configura timeout para erro
        const loadTimeout = setTimeout(() => {
            hideLoading();
            showError('Tempo esgotado ao carregar o canal. Tente outro.');
            el.classList.add('loading');
        }, 10000);

        // Handler para erro de carregamento
        videoElement.onerror = () => {
            clearTimeout(loadTimeout);
            hideLoading();
            showError('Erro ao reproduzir este canal. Tente outro.');
            el.classList.add('loading');
        };
        
        // Handler para sucesso
        videoElement.onplaying = () => {
            clearTimeout(loadTimeout);
            hideLoading();
            el.classList.remove('loading');
        };

        try {
            if (mpegts.getFeatureList().mseLivePlayback) {
                player = mpegts.createPlayer({ 
                    type: 'mse', 
                    isLive: true, 
                    url: `/api/proxy?url=${encodeURIComponent(url)}`,
                    enableStashBuffer: false,
                    autoCleanupSourceBuffer: true
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                player.play().catch(err => {
                    console.error('Erro no playback:', err);
                    hideLoading();
                    showError('Erro ao iniciar reprodução.');
                });
            } else {
                hideLoading();
                showError('Seu navegador não suporta este formato de vídeo.');
            }
        } catch (err) {
            console.error('Erro:', err);
            hideLoading();
            showError('Erro ao configurar o player.');
        }
    }

    function toggleTheme() {
        const newTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
        document.body.dataset.theme = newTheme;
        localStorage.setItem('theme', newTheme);
    }
    
    function toggleMenu() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }
    
    function showLoading() {
        loadingOverlay.classList.add('active');
    }
    
    function hideLoading() {
        loadingOverlay.classList.remove('active');
    }
    
    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.classList.add('active');
        setTimeout(hideError, 5000);
    }
    
    function hideError() {
        errorMessage.classList.remove('active');
    }
    
    // Fecha menu com ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sidebar.classList.contains('open')) {
            toggleMenu();
        }
    });
    
    // Carrega tema salvo e última categoria
    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.dataset.theme = savedTheme;
        
        const savedCategory = localStorage.getItem('lastCategory') || 'todos';
        // Não aplica automaticamente, mas mantém disponível
    });

    // Inicia carregamento
    fetchM3U();
</script>
</body>
</html>
